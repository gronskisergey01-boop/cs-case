services:
  - type: web
    name: cs-case
    env: python
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      python generate_images.py
    startCommand: uvicorn server:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0